services:
  postgres:
    image: postgres:17-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kanban
    ports:
      # Host port is configurable (default 5432) to avoid clashing with a
      # native Postgres install; container always listens on 5432 internally.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kanban-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kanban-pgdata:
